<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0d0a07"/>
  <title>Fabian &amp; Soffy — Muy Pronto</title>

  <!-- CSS modular -->
  <link rel="stylesheet" href="css/theme.css"/>
  <link rel="stylesheet" href="css/01-base.css"/>
  <link rel="stylesheet" href="css/08-coming-soon.css"/>
</head>
<body class="cs-body">

<!-- Fondo desenfocado -->
<div class="cs-bg" aria-hidden="true">
  <img
    src="https://images.unsplash.com/photo-1519741497674-611481863552?w=1200&q=60&auto=format&fit=crop"
    alt=""
    loading="eager"
  />
</div>

<!-- Contenido principal -->
<main class="cs-content">
  <p class="cs-tag reveal-up">Una historia de amor · Cúcuta, Colombia</p>

  <div class="cs-monogram reveal-up" style="--delay:0.1s" aria-label="Fabián y Soffy">
    Fabian <span>&amp;</span> Soffy
  </div>

  <p class="cs-title reveal-up" style="--delay:0.2s">Muy Pronto</p>
  <p class="cs-date-badge reveal-up" style="--delay:0.25s">22 · Agosto · 2026 · Cúcuta</p>

  <!-- Contador -->
  <div class="cs-countdown reveal-up" style="--delay:0.3s">
    <div class="cs-cd-unit">
      <span class="cs-cd-num" id="cs-days">000</span>
      <span class="cs-cd-label">Días</span>
    </div>
    <div class="cs-cd-sep" aria-hidden="true">·</div>
    <div class="cs-cd-unit">
      <span class="cs-cd-num" id="cs-hours">00</span>
      <span class="cs-cd-label">Horas</span>
    </div>
    <div class="cs-cd-sep" aria-hidden="true">·</div>
    <div class="cs-cd-unit">
      <span class="cs-cd-num" id="cs-minutes">00</span>
      <span class="cs-cd-label">Minutos</span>
    </div>
    <div class="cs-cd-sep" aria-hidden="true">·</div>
    <div class="cs-cd-unit">
      <span class="cs-cd-num" id="cs-seconds">00</span>
      <span class="cs-cd-label">Segundos</span>
    </div>
  </div>

  <p class="cs-date-badge reveal-up" style="--delay:0.4s; opacity:0.5; font-style:italic">
    Con tutto il nostro amore — per sempre
  </p>
</main>

<!-- Botón acceso privado (discreto, esquina inferior derecha) -->
<button
  id="cs-private-btn"
  class="cs-private-btn"
  aria-label="Acceso privado"
  title="Acceso privado"
>
  <svg viewBox="0 0 24 24" aria-hidden="true">
    <rect x="5" y="11" width="14" height="10" rx="1.5"/>
    <path d="M8 11V7a4 4 0 018 0v4" stroke-linecap="round"/>
  </svg>
  Acceso privado
</button>

<!-- Modal contraseña -->
<div id="cs-modal-overlay" class="cs-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="cs-modal-title">
  <div class="cs-modal">
    <button id="cs-modal-close" class="cs-modal-close" aria-label="Cerrar">
      <svg width="10" height="10" viewBox="0 0 14 14" fill="none">
        <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>

    <p id="cs-modal-title" class="cs-modal-title">Acceso Privado</p>
    <p class="cs-modal-sub">Ingresa la contraseña para continuar</p>

    <div class="cs-input-wrap">
      <input
        id="cs-password"
        type="password"
        class="cs-input"
        placeholder="· · · · · · · ·"
        autocomplete="current-password"
        spellcheck="false"
      />
      <button
        id="cs-eye-btn"
        class="cs-eye-btn"
        aria-label="Mostrar / ocultar contraseña"
        type="button"
      >
        <!-- Ojo -->
        <svg viewBox="0 0 22 16" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
          <path d="M1 8S4.5 1 11 1s10 7 10 7-3.5 7-10 7S1 8 1 8z"/>
          <circle cx="11" cy="8" r="3"/>
        </svg>
      </button>
    </div>

    <p id="cs-error-msg" class="cs-error-msg" role="alert">Contraseña incorrecta</p>

    <button id="cs-submit-btn" class="cs-submit-btn ripple" type="button">
      Ingresar
    </button>
  </div>
</div>

<!-- Flash dorado al ingresar -->
<div id="cs-flash" class="cs-flash" aria-hidden="true"></div>

<!-- Scripts -->
<script src="js/06-coming-soon.js"></script>
<script>
  // Activar elementos reveal-up inmediatamente (sin loader)
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.reveal-up').forEach(function (el) {
      setTimeout(function () { el.classList.add('visible'); },
        parseFloat(getComputedStyle(el).getPropertyValue('--delay') || '0') * 1000
      );
    });
  });
</script>

</body>
</html>
